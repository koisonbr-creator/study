<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英単語暗記アプリ</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: #f5f7fa;
    margin: 0;
    color: #222;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
    min-height: 100vh;
    background: #fff;
    box-shadow: 0 0 20px rgba(0,0,0,0.05);
  }
  h1 {
    font-size: 20px;
    text-align: center;
    margin: 8px 0 16px;
    color: #2b5fad;
  }
  nav {
    display: flex;
    border-bottom: 2px solid #eee;
    margin-bottom: 16px;
  }
  nav button {
    flex: 1;
    padding: 10px;
    border: none;
    background: none;
    font-size: 14px;
    color: #888;
    cursor: pointer;
    border-bottom: 3px solid transparent;
  }
  nav button.active {
    color: #2b5fad;
    border-bottom: 3px solid #2b5fad;
    font-weight: bold;
  }
  .tab { display: none; }
  .tab.active { display: block; }

  .stats {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat-box {
    flex: 1;
    background: #eef3fb;
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .stat-box .num { font-size: 22px; font-weight: bold; color: #2b5fad; }
  .stat-box .label { font-size: 12px; color: #666; margin-top: 4px; }

  .primary-btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: #2b5fad;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 8px;
  }
  .primary-btn:disabled { background: #ccc; cursor: default; }

  .card {
    border: 1px solid #eee;
    border-radius: 14px;
    padding: 32px 16px;
    text-align: center;
    margin: 16px 0;
    min-height: 160px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .card .word { font-size: 30px; font-weight: bold; color: #222; }
  .card .meaning { font-size: 20px; color: #2b5fad; margin-top: 16px; }
  .card .hint { font-size: 12px; color: #aaa; margin-top: 12px; }

  .rate-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .rate-buttons button {
    padding: 12px 4px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    color: #fff;
    cursor: pointer;
  }
  .rate-again { background: #d9534f; }
  .rate-hard { background: #f0ad4e; }
  .rate-good { background: #5cb85c; }
  .rate-easy { background: #2b5fad; }

  .done-message {
    text-align: center;
    padding: 40px 0;
    color: #2b5fad;
    font-size: 16px;
  }

  .practice-banner {
    background: #fff7e6;
    color: #b8860b;
    font-size: 12px;
    padding: 8px;
    border-radius: 8px;
    text-align: center;
    margin-bottom: 8px;
  }
  #today-section {
    margin-top: 20px;
    border-top: 1px solid #eee;
    padding-top: 16px;
  }
  .today-list-title {
    font-size: 13px;
    color: #666;
    margin-bottom: 8px;
  }
  .today-word {
    display: flex;
    justify-content: space-between;
    padding: 6px 8px;
    border-bottom: 1px solid #f5f5f5;
    font-size: 14px;
  }
  .today-word .en { font-weight: bold; }
  .today-word .ja { color: #666; }
  .quiz-btn { background: #5cb85c; }

  .quiz-progress { font-size: 13px; color: #666; margin-bottom: 8px; text-align: center; }
  .quiz-choices { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .quiz-choices button {
    padding: 14px;
    border: 1px solid #ddd;
    border-radius: 10px;
    background: #fff;
    font-size: 15px;
    text-align: left;
    cursor: pointer;
  }
  .quiz-choices button.correct { background: #eaf7ea; border-color: #5cb85c; color: #2e7d32; }
  .quiz-choices button.wrong { background: #fdecea; border-color: #d9534f; color: #c62828; }
  .quiz-choices button:disabled { cursor: default; }
  .quiz-result-date { font-size: 13px; color: #888; margin-bottom: 8px; }

  #quiz-log-section { margin-top: 16px; }
  .quiz-log-entry {
    display: flex;
    justify-content: space-between;
    padding: 6px 8px;
    border-bottom: 1px solid #f5f5f5;
    font-size: 14px;
  }
  .quiz-log-entry .time { color: #999; }
  .quiz-log-entry .score { font-weight: bold; color: #2b5fad; }

  form.add-form input, form.add-form select {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
  }
  label { font-size: 13px; color: #666; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 6px 4px; border-bottom: 1px solid #eee; text-align: left; }
  th { color: #888; font-weight: normal; }
  .status-new { color: #f0ad4e; }
  .status-learning { color: #2b5fad; }
  .status-done { color: #5cb85c; }
  .del-btn { color: #d9534f; background: none; border: none; cursor: pointer; font-size: 12px; }

  .settings-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #666;
  }
  .settings-row input { width: 60px; padding: 4px; }
</style>
</head>
<body>
<div class="container">
  <h1>英単語暗記アプリ</h1>
  <nav>
    <button class="tab-btn active" data-tab="study">学習</button>
    <button class="tab-btn" data-tab="add">単語を追加</button>
    <button class="tab-btn" data-tab="list">単語一覧</button>
  </nav>

  <div id="tab-study" class="tab active">
    <div class="stats">
      <div class="stat-box"><div class="num" id="stat-due">0</div><div class="label">今日の復習</div></div>
      <div class="stat-box"><div class="num" id="stat-new">0</div><div class="label">新しい単語</div></div>
      <div class="stat-box"><div class="num" id="stat-total">0</div><div class="label">総単語数</div></div>
    </div>
    <div class="settings-row">
      1日に追加する新規単語の上限:
      <input type="number" id="new-limit" min="1" max="50" value="10">
    </div>
    <button class="primary-btn" id="start-btn">学習を開始する</button>

    <div id="study-area" style="display:none;">
      <div id="practice-banner" class="practice-banner" style="display:none;">復習モード：ここでの評価は記録に反映されません</div>
      <div class="card" id="flash-card">
        <div class="word" id="card-word"></div>
        <div class="meaning" id="card-meaning" style="display:none;"></div>
        <div class="hint" id="card-hint">意味を思い出してから「答えを見る」を押してください</div>
      </div>
      <button class="primary-btn" id="reveal-btn">答えを見る</button>
      <div class="rate-buttons" id="rate-buttons" style="display:none;">
        <button class="rate-again" data-q="0">もう一度</button>
        <button class="rate-hard" data-q="3">難しい</button>
        <button class="rate-good" data-q="4">普通</button>
        <button class="rate-easy" data-q="5">簡単</button>
      </div>
    </div>
    <div id="done-area" class="done-message" style="display:none;">
      今日の学習分は終わりです。おつかれさまでした！
    </div>

    <div id="today-section" style="display:none;">
      <div class="today-list-title">本日学習した単語（<span id="today-count">0</span>語）</div>
      <div id="today-list"></div>
      <button class="primary-btn" id="repeat-btn">同じ単語をもう一度復習する</button>
      <button class="primary-btn quiz-btn" id="quiz-btn">この単語で4択クイズに挑戦する</button>
      <div id="quiz-log-section" style="display:none;">
        <div class="today-list-title">本日のクイズ結果</div>
        <div id="quiz-log-list"></div>
      </div>
    </div>

    <div id="quiz-area" style="display:none;">
      <div class="quiz-progress" id="quiz-progress"></div>
      <div class="card" id="quiz-card">
        <div class="word" id="quiz-word"></div>
      </div>
      <div class="quiz-choices" id="quiz-choices"></div>
      <button class="primary-btn" id="quiz-next-btn" style="display:none;">次へ</button>
    </div>
    <div id="quiz-result" class="done-message" style="display:none;"></div>
  </div>

  <div id="tab-add" class="tab">
    <form class="add-form" id="add-form">
      <label>英単語</label>
      <input type="text" id="new-en" required>
      <label>意味（日本語）</label>
      <input type="text" id="new-ja" required>
      <button type="submit" class="primary-btn">追加する</button>
    </form>
  </div>

  <div id="tab-list" class="tab">
    <table>
      <thead><tr><th>単語</th><th>意味</th><th>状態</th><th>次回</th><th></th></tr></thead>
      <tbody id="word-list-body"></tbody>
    </table>
  </div>
</div>

const STORAGE_KEY = "eitangoCards";
const TODAY_LOG_KEY = "eitangoTodayLog";
const QUIZ_LOG_KEY = "eitangoQuizLog";
let cards = [];
let queue = [];
let currentCard = null;
let practiceMode = false;

function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function formatDateJP(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  return y + "年" + m + "月" + d + "日";
}

function loadTodayLog() {
  const raw = localStorage.getItem(TODAY_LOG_KEY);
  const log = raw ? JSON.parse(raw) : null;
  if (!log || log.date !== todayStr()) {
    return { date: todayStr(), ids: [] };
  }
  return log;
}

function recordTodayStudied(id) {
  const log = loadTodayLog();
  if (!log.ids.includes(id)) log.ids.push(id);
  localStorage.setItem(TODAY_LOG_KEY, JSON.stringify(log));
}

function loadQuizLog() {
  const raw = localStorage.getItem(QUIZ_LOG_KEY);
  const all = raw ? JSON.parse(raw) : [];
  return all.filter(e => e.date === todayStr());
}

function recordQuizResult(score, total) {
  const raw = localStorage.getItem(QUIZ_LOG_KEY);
  const all = raw ? JSON.parse(raw) : [];
  const now = new Date();
  const time = String(now.getHours()).padStart(2, "0") + ":" + String(now.getMinutes()).padStart(2, "0");
  all.push({ date: todayStr(), time: time, score: score, total: total });
  localStorage.setItem(QUIZ_LOG_KEY, JSON.stringify(all));
}

function renderQuizLog() {
  const entries = loadQuizLog();
  const section = document.getElementById("quiz-log-section");
  if (entries.length === 0) {
    section.style.display = "none";
    return;
  }
  document.getElementById("quiz-log-list").innerHTML = entries.map(e =>
    `<div class="quiz-log-entry"><span class="time">${e.time}</span><span class="score">${e.total}問中${e.score}問正解</span></div>`
  ).join("");
  section.style.display = "block";
}

function renderTodayList() {
  const log = loadTodayLog();
  const section = document.getElementById("today-section");
  const todayCards = log.ids.map(id => cards.find(c => c.id === id)).filter(Boolean);
  if (todayCards.length === 0) {
    section.style.display = "none";
    return;
  }
  document.getElementById("today-count").textContent = todayCards.length;
  document.getElementById("today-list").innerHTML = todayCards.map(c =>
    `<div class="today-word"><span class="en">${c.en}</span><span class="ja">${c.ja}</span></div>`
  ).join("");
  section.style.display = "block";
}

function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  cards = raw ? JSON.parse(raw) : [];
  const existing = new Set(cards.map(c => c.en.toLowerCase()));
  let nextId = cards.length ? Math.max(...cards.map(c => c.id)) + 1 : 0;
  let added = false;
  PRESET_WORDS.forEach(([en, ja]) => {
    if (!existing.has(en.toLowerCase())) {
      cards.push(makeCard(nextId++, en, ja));
      existing.add(en.toLowerCase());
      added = true;
    }
  });
  if (added) save();
}

function makeCard(id, en, ja) {
  return {
    id: id,
    en: en,
    ja: ja,
    easeFactor: 2.5,
    interval: 0,
    repetitions: 0,
    dueDate: todayStr(),
    isNew: true
  };
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
}

function updateStats() {
  const due = cards.filter(c => !c.isNew && c.dueDate <= todayStr()).length;
  const brandNew = cards.filter(c => c.isNew).length;
  document.getElementById("stat-due").textContent = due;
  document.getElementById("stat-new").textContent = brandNew;
  document.getElementById("stat-total").textContent = cards.length;
}

function buildQueue() {
  const limit = parseInt(document.getElementById("new-limit").value) || 10;
  const dueCards = cards.filter(c => !c.isNew && c.dueDate <= todayStr());
  const newCards = cards.filter(c => c.isNew).slice(0, limit);
  queue = [...dueCards, ...newCards];
  // shuffle
  for (let i = queue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [queue[i], queue[j]] = [queue[j], queue[i]];
  }
}

function showNextCard() {
  if (queue.length === 0) {
    document.getElementById("study-area").style.display = "none";
    document.getElementById("done-area").style.display = "block";
    document.getElementById("start-btn").style.display = "block";
    practiceMode = false;
    updateStats();
    renderTodayList();
    renderQuizLog();
    return;
  }
  currentCard = queue.shift();
  document.getElementById("card-word").textContent = currentCard.en;
  document.getElementById("card-meaning").style.display = "none";
  document.getElementById("card-meaning").textContent = currentCard.ja;
  document.getElementById("card-hint").style.display = "block";
  document.getElementById("reveal-btn").style.display = "block";
  document.getElementById("rate-buttons").style.display = "none";
}

function updateCard(card, quality) {
  if (quality < 3) {
    card.repetitions = 0;
    card.interval = 1;
  } else {
    if (card.repetitions === 0) {
      card.interval = 1;
    } else if (card.repetitions === 1) {
      card.interval = 6;
    } else {
      card.interval = Math.round(card.interval * card.easeFactor);
    }
    card.repetitions += 1;
  }
  card.easeFactor = Math.max(1.3, card.easeFactor + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)));
  card.isNew = false;
  const due = new Date();
  due.setDate(due.getDate() + card.interval);
  card.dueDate = due.toISOString().slice(0,10);
}

document.getElementById("start-btn").addEventListener("click", () => {
  practiceMode = false;
  document.getElementById("practice-banner").style.display = "none";
  buildQueue();
  if (queue.length === 0) {
    updateStats();
    renderTodayList();
    renderQuizLog();
    document.getElementById("done-area").style.display = "block";
    return;
  }
  document.getElementById("done-area").style.display = "none";
  document.getElementById("today-section").style.display = "none";
  document.getElementById("study-area").style.display = "block";
  document.getElementById("start-btn").style.display = "none";
  showNextCard();
});

let quizQuestions = [];
let quizIndex = 0;
let quizScore = 0;

function buildQuizQuestions(sourceCards) {
  return sourceCards.map(c => {
    const distractorPool = cards.filter(o => o.id !== c.id && o.ja !== c.ja);
    for (let i = distractorPool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [distractorPool[i], distractorPool[j]] = [distractorPool[j], distractorPool[i]];
    }
    const distractors = distractorPool.slice(0, 3).map(o => o.ja);
    const choices = [c.ja, ...distractors];
    for (let i = choices.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [choices[i], choices[j]] = [choices[j], choices[i]];
    }
    return { word: c.en, answer: c.ja, choices };
  });
}

function showQuizQuestion() {
  const q = quizQuestions[quizIndex];
  document.getElementById("quiz-progress").textContent = (quizIndex + 1) + " / " + quizQuestions.length + "問";
  document.getElementById("quiz-word").textContent = q.word;
  document.getElementById("quiz-next-btn").style.display = "none";
  const choicesEl = document.getElementById("quiz-choices");
  choicesEl.innerHTML = "";
  q.choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.textContent = choice;
    btn.addEventListener("click", () => selectQuizAnswer(choice, btn));
    choicesEl.appendChild(btn);
  });
}

function selectQuizAnswer(choice, btn) {
  const q = quizQuestions[quizIndex];
  const buttons = document.querySelectorAll("#quiz-choices button");
  buttons.forEach(b => b.disabled = true);
  if (choice === q.answer) {
    btn.classList.add("correct");
    quizScore++;
  } else {
    btn.classList.add("wrong");
    buttons.forEach(b => { if (b.textContent === q.answer) b.classList.add("correct"); });
  }
  document.getElementById("quiz-next-btn").style.display = "block";
}

document.getElementById("quiz-next-btn").addEventListener("click", () => {
  quizIndex++;
  if (quizIndex >= quizQuestions.length) {
    document.getElementById("quiz-area").style.display = "none";
    recordQuizResult(quizScore, quizQuestions.length);
    const resultEl = document.getElementById("quiz-result");
    resultEl.innerHTML = "<div class='quiz-result-date'>" + formatDateJP(todayStr()) + "</div>" +
      quizQuestions.length + "問中 <b>" + quizScore + "問</b> 正解でした！<br><br>";
    const backBtn = document.createElement("button");
    backBtn.className = "primary-btn";
    backBtn.textContent = "戻る";
    backBtn.addEventListener("click", () => {
      resultEl.style.display = "none";
      renderTodayList();
      renderQuizLog();
    });
    resultEl.appendChild(backBtn);
    resultEl.style.display = "block";
    return;
  }
  showQuizQuestion();
});

document.getElementById("quiz-btn").addEventListener("click", () => {
  const log = loadTodayLog();
  const todayCards = log.ids.map(id => cards.find(c => c.id === id)).filter(Boolean);
  if (todayCards.length === 0) return;
  quizQuestions = buildQuizQuestions(todayCards);
  quizIndex = 0;
  quizScore = 0;
  document.getElementById("today-section").style.display = "none";
  document.getElementById("quiz-result").style.display = "none";
  document.getElementById("quiz-area").style.display = "block";
  showQuizQuestion();
});

document.getElementById("repeat-btn").addEventListener("click", () => {
  const log = loadTodayLog();
  const todayCards = log.ids.map(id => cards.find(c => c.id === id)).filter(Boolean);
  if (todayCards.length === 0) return;
  queue = [...todayCards];
  for (let i = queue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [queue[i], queue[j]] = [queue[j], queue[i]];
  }
  practiceMode = true;
  document.getElementById("practice-banner").style.display = "block";
  document.getElementById("done-area").style.display = "none";
  document.getElementById("today-section").style.display = "none";
  document.getElementById("study-area").style.display = "block";
  document.getElementById("start-btn").style.display = "none";
  showNextCard();
});

document.getElementById("reveal-btn").addEventListener("click", () => {
  document.getElementById("card-meaning").style.display = "block";
  document.getElementById("card-hint").style.display = "none";
  document.getElementById("reveal-btn").style.display = "none";
  document.getElementById("rate-buttons").style.display = "grid";
});

document.getElementById("rate-buttons").addEventListener("click", (e) => {
  const btn = e.target.closest("button");
  if (!btn) return;
  const quality = parseInt(btn.dataset.q);
  if (!practiceMode) {
    updateCard(currentCard, quality);
    save();
    recordTodayStudied(currentCard.id);
  }
  showNextCard();
});

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
    if (btn.dataset.tab === "list") renderWordList();
  });
});

document.getElementById("add-form").addEventListener("submit", (e) => {
  e.preventDefault();
  const en = document.getElementById("new-en").value.trim();
  const ja = document.getElementById("new-ja").value.trim();
  if (!en || !ja) return;
  const newId = cards.length ? Math.max(...cards.map(c => c.id)) + 1 : 0;
  cards.push(makeCard(newId, en, ja));
  save();
  updateStats();
  document.getElementById("new-en").value = "";
  document.getElementById("new-ja").value = "";
  alert("「" + en + "」を追加しました。");
});

function renderWordList() {
  const body = document.getElementById("word-list-body");
  body.innerHTML = "";
  cards.slice().sort((a,b) => a.dueDate.localeCompare(b.dueDate)).forEach(c => {
    const tr = document.createElement("tr");
    let statusText, statusClass;
    if (c.isNew) { statusText = "未学習"; statusClass = "status-new"; }
    else if (c.interval < 21) { statusText = "学習中"; statusClass = "status-learning"; }
    else { statusText = "定着"; statusClass = "status-done"; }
    tr.innerHTML = `
      <td>${c.en}</td>
      <td>${c.ja}</td>
      <td class="${statusClass}">${statusText}</td>
      <td>${c.isNew ? "-" : c.dueDate}</td>
      <td><button class="del-btn" data-id="${c.id}">削除</button></td>
    `;
    body.appendChild(tr);
  });
  body.querySelectorAll(".del-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = parseInt(btn.dataset.id);
      cards = cards.filter(c => c.id !== id);
      save();
      renderWordList();
      updateStats();
    });
  });
}

load();
updateStats();
renderTodayList();
renderQuizLog();
</script>
</body>
</html>
